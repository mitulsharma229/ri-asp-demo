<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ri-asp-demo/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
    <script type="module" crossorigin src="/ri-asp-demo/assets/index-B5nAT6PD.js"></script>
    <link rel="stylesheet" crossorigin href="/ri-asp-demo/assets/index-DyzJ8x1d.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap">' + msg + '\n' + src + ':' + line + '\n' + (err && err.stack || '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap">Unhandled rejection: ' + e.reason + '</pre>';
      });
    </script>
  </body>
</html>
